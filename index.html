  .header-bar {

  }

  }

  .header-bar .subtitle {

  }

  .legend {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 1000;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 180px;
  }

  .legend h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #6b7084;
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s;
  }

  .legend-item.dimmed {
    opacity: 0.3;
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 13px;
    font-weight: 500;
    color: #c8ccd5;
    flex: 1;
  }

  .legend-count {
    font-size: 12px;
    color: #6b7084;
    font-weight: 600;
  }

  .leaflet-popup-content-wrapper {

    border-radius: 10px !important;

    padding: 0 !important;
  }

    padding: 14px 16px !important;
  }

  .popup-name {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .popup-region {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.6px;

    background: rgba(30,33,43,0.95) !important;

// ── State-to-region mapping ──

  'WA': 'NW Region', 'OR': 'NW Region', 'ID': 'NW Region',
  'NV': 'SW Region', 'AZ': 'SW Region',
  'CA': 'NW Region',
  'PA': 'NE Region', 'OH': 'NE Region', 'KY': 'NE Region',

};

// ── Initialize map ──
const map = L.map('map', {
  center: [38.5, -98],
  zoom: 5,
  zoomControl: false,
  attributionControl: false,
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
}).addTo(map);

// ── Layer groups ──
const stateLayerGroups = {};
const pinLayerGroups = {};
const regionVisibility = {};

Object.keys(REGIONS).forEach(r => {
  stateLayerGroups[r] = L.layerGroup().addTo(map);
  pinLayerGroups[r] = L.layerGroup().addTo(map);
  regionVisibility[r] = true;
});

// ── Load US state GeoJSON and color by region ──
fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
  .then(r => r.json())
  .then(geojson => {
    geojson.features.forEach(feature => {
      const stateName = feature.properties.name;
      const stateAbbr = stateNameToAbbr(stateName);
      const region = stateRegions[stateAbbr];

      if (region && REGIONS[region]) {
        const layer = L.geoJSON(feature, {
          style: {
            fillColor: REGIONS[region].color,
            fillOpacity: 0.18,
            color: REGIONS[region].color,
            weight: 1.5,
            opacity: 0.5,
          }
        });
        stateLayerGroups[region].addLayer(layer);
      }
    });
  });

// ── Add pins ──
Object.entries(locations).forEach(([region, locs]) => {
  const cfg = REGIONS[region];
  locs.forEach(loc => {
    const marker = L.circleMarker([loc.lat, loc.lng], {
      radius: 6,
      fillColor: cfg.color,
      fillOpacity: 0.9,
      color: '#fff',
      weight: 1.5,
      opacity: 0.9,
    });

    marker.bindPopup(`
      <div class="popup-name">${loc.name}</div>
      <div class="popup-region" style="background:${cfg.color}22; color:${cfg.color}; border:1px solid ${cfg.color}44;">
        ${cfg.label}
      </div>
    `);

    pinLayerGroups[region].addLayer(marker);
  });
});

// ── Build legend ──
const legendEl = document.getElementById('legend');
Object.entries(REGIONS).forEach(([key, cfg]) => {
  const count = locations[key] ? locations[key].length : 0;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.region = key;
  item.innerHTML = `
    <div class="legend-swatch" style="background:${cfg.color}"></div>
    <span class="legend-label">${cfg.label}</span>
    <span class="legend-count">${count}</span>
  `;
  item.addEventListener('click', () => toggleRegion(key, item));
  legendEl.appendChild(item);
});

function toggleRegion(region, el) {
  regionVisibility[region] = !regionVisibility[region];
  if (regionVisibility[region]) {
    map.addLayer(stateLayerGroups[region]);
    map.addLayer(pinLayerGroups[region]);
    el.classList.remove('dimmed');
  } else {
    map.removeLayer(stateLayerGroups[region]);
    map.removeLayer(pinLayerGroups[region]);
    el.classList.add('dimmed');
  }
}

// ── State name → abbreviation mapping ──
function stateNameToAbbr(name) {
  const map = {
    'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
    'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA',
    'Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA',
    'Kansas':'KS','Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD',
    'Massachusetts':'MA','Michigan':'MI','Minnesota':'MN','Mississippi':'MS','Missouri':'MO',
    'Montana':'MT','Nebraska':'NE','Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ',
    'New Mexico':'NM','New York':'NY','North Carolina':'NC','North Dakota':'ND','Ohio':'OH',
    'Oklahoma':'OK','Oregon':'OR','Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC',
    'South Dakota':'SD','Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT',
    'Virginia':'VA','Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY',
  };
  return map[name] || '';
}
